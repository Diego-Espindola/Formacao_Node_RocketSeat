name: Run Unit Tests

on:
  push:
    paths:
      - '03-API-SOLID/**'
      - '.github/workflows/03-API-SOLID-run-unit-tests.yml'

jobs:
  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 03-API-SOLID/package-lock.json
        
      - run: cd 03-API-SOLID && npm ci
      - run: cd 03-API-SOLID && npm run test
