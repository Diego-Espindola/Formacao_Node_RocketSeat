services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
      POSTGRES_DB: gym
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gym -d gym']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./gym-backend
    expose:
      - '3377'
    environment:
      DATABASE_URL: postgresql://gym:gym@postgres:5432/gym
      SEED_PATH: /app/data/seed.json
    volumes:
      - ./gym-backend:/app
      - ./data:/app/data
      - /app/node_modules
      - /app/generated
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build: ./gym-frontend
    expose:
      - '3378'
    volumes:
      - ./gym-frontend:/app
      - /app/node_modules
    command: npm start

  nginx:
    image: nginx:alpine
    ports:
      - '47831:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
