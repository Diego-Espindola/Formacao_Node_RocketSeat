services:
  backend:
    build: ./gym-backend
    expose:
      - "3377"
    volumes:
      - ./gym-backend:/app
      - ./data:/app/data        # SQLite versionado no Git
    command: npm run dev

  frontend:
    build: ./gym-frontend
    expose:
      - "3378"
    volumes:
      - ./gym-frontend:/app
      - /app/node_modules       # evita sobrescrever node_modules do container
    command: npm start

  nginx:
    image: nginx:alpine
    ports:
      - "47831:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped