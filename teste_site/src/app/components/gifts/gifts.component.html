<div class="py-20 bg-rose/20 text-center px-4">
  <h2 class="text-4xl font-serif text-dark mb-6">Lista de Presentes</h2>
  <p class="max-w-2xl mx-auto text-gray-700 mb-10 leading-relaxed">
    Nossa maior alegria é ter você celebrando conosco! Caso queira nos presentear, criamos uma lista online e também disponibilizamos nossa chave Pix para a lua de mel.
  </p>
  
  <div class="flex flex-col md:flex-row justify-center gap-8 max-w-4xl mx-auto">
    <div class="bg-white p-8 rounded-xl shadow-md flex-1">
      <h3 class="text-2xl font-serif mb-4">Lista Online</h3>
      <a href="LINK_DA_LOJA" target="_blank" class="block w-full bg-dark text-white py-3 rounded-lg hover:bg-gray-800 transition">
        Acessar Lista na Loja
      </a>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-md flex-1">
      <h3 class="text-2xl font-serif mb-4">Gravata / Lua de Mel</h3>
      <img src="assets/images/qrcode-pix.png" alt="QR Code Pix" class="w-32 h-32 mx-auto mb-4 border p-1" />
      <p class="text-sm font-mono bg-gray-100 p-2 rounded mb-4 break-all">{{ pixKey }}</p>
      <button (click)="copyPix()" class="w-full bg-mint text-dark font-bold py-3 rounded-lg hover:brightness-95 transition">
        {{ copied ? 'Chave Copiada! ✓' : 'Copiar Chave Pix' }}
      </button>
    </div>
  </div>
</div>
