<div class="py-16 bg-mint/30 flex justify-center px-4" data-aos="fade-up">
  <div class="text-center">
    <h2 class="text-3xl font-serif text-dark mb-8">Contagem Regressiva</h2>
    <div class="flex gap-4 md:gap-8 justify-center">
      <div class="bg-white rounded-lg shadow w-20 h-20 md:w-24 md:h-24 flex flex-col items-center justify-center">
        <span class="text-3xl md:text-4xl font-bold text-dark">{{ days }}</span>
        <span class="text-xs md:text-sm uppercase text-gray-500">Dias</span>
      </div>
      <div class="bg-white rounded-lg shadow w-20 h-20 md:w-24 md:h-24 flex flex-col items-center justify-center">
        <span class="text-3xl md:text-4xl font-bold text-dark">{{ hours }}</span>
        <span class="text-xs md:text-sm uppercase text-gray-500">Horas</span>
      </div>
      <div class="bg-white rounded-lg shadow w-20 h-20 md:w-24 md:h-24 flex flex-col items-center justify-center">
        <span class="text-3xl md:text-4xl font-bold text-dark">{{ minutes }}</span>
        <span class="text-xs md:text-sm uppercase text-gray-500">Min</span>
      </div>
      <div class="bg-white rounded-lg shadow w-20 h-20 md:w-24 md:h-24 flex flex-col items-center justify-center">
        <span class="text-3xl md:text-4xl font-bold text-dark">{{ seconds }}</span>
        <span class="text-xs md:text-sm uppercase text-gray-500">Seg</span>
      </div>
    </div>
  </div>
</div>
