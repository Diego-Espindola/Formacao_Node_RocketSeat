<div class="py-20 bg-white px-4" id="gallery">
  <div class="container mx-auto max-w-5xl text-center">
    <h2 class="text-4xl font-serif text-dark mb-12" data-aos="fade-up">Nossos Momentos</h2>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      @for (img of images; track img) {
        <div
          class="overflow-hidden rounded-xl cursor-pointer shadow-sm hover:shadow-xl transition duration-300"
          (click)="openLightbox(img)"
          data-aos="zoom-in">
          <img [src]="img" class="w-full h-48 md:h-64 object-cover hover:scale-110 transition duration-500" alt="Foto do casal">
        </div>
      }
    </div>
  </div>
</div>

@if (selectedImage) {
  <div class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
    <button
      (click)="closeLightbox()"
      class="absolute top-6 right-6 text-white text-5xl font-light hover:text-rose transition cursor-pointer">
      &times;
    </button>
    <img [src]="selectedImage" class="max-w-full max-h-[90vh] object-contain rounded-md shadow-2xl">
  </div>
}
