<div class="fixed bottom-6 right-6 z-50">
  <audio #audioEl src="assets/music/musica-casal.mp3" loop></audio>

  <button
    (click)="togglePlay()"
    class="bg-mint text-dark w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:scale-110 transition duration-300 border-2 border-white">
    @if (isPlaying) {
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6" />
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    }
  </button>
</div>
